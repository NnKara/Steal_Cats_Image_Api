services:
  api:
    build:
      context: .
      dockerfile: Steal_Cats_Image_Api/Dockerfile
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=StealCatsImageDb;User Id=sa;Password=@yourPassword;TrustServerCertificate=True
      - ConnectionStrings__HangfireConnection=Server=sqlserver;Database=StealCatsImageDb;User Id=sa;Password=@yourPassword;TrustServerCertificate=True
      - TheCatApi__ApiKey=${THECATAPI_KEY}
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU16-ubuntu-22.04
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=@yourPassword
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -C -U sa -P '@yourPassword' -Q 'SELECT 1' -b -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sqlserver_data:
